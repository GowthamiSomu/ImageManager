<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImageManager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset & tokens ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0e0e0e;
  --bg2:       #161616;
  --bg3:       #1e1e1e;
  --border:    #2a2a2a;
  --border2:   #383838;
  --text:      #e8e4dc;
  --muted:     #6b6760;
  --soft:      #9e9890;
  --amber:     #d4a853;
  --amber-dim: rgba(212,168,83,0.12);
  --green:     #4a9e6b;
  --green-dim: rgba(74,158,107,0.12);
  --red:       #c45c5c;
  --red-dim:   rgba(196,92,92,0.12);
  --blue:      #5c8fc4;
  --r:         6px;
  --font-mono: 'IBM Plex Mono', monospace;
  --font-sans: 'IBM Plex Sans', sans-serif;
  --font-disp: 'Playfair Display', serif;
}

html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 13.5px;
  line-height: 1.6;
  display: flex;
  flex-direction: column;
}

/* ── Scrollbar ──────────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── Header ─────────────────────────────────────────────────── */
.header {
  display: flex; align-items: center; gap: 0;
  height: 52px; flex-shrink: 0;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  position: relative; z-index: 200;
}

.logo {
  font-family: var(--font-disp);
  font-size: 19px;
  color: var(--amber);
  letter-spacing: .01em;
  margin-right: 28px;
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0;
}
.logo-icon {
  width: 28px; height: 28px;
  background: var(--amber-dim);
  border: 1px solid rgba(212,168,83,.3);
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}

/* search */
.search-wrap { position: relative; flex: 1; max-width: 420px; }
.search-wrap input {
  width: 100%; height: 32px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--r); padding: 0 12px 0 34px;
  font-family: var(--font-mono); font-size: 12px; color: var(--text);
  outline: none; transition: border .15s;
}
.search-wrap input::placeholder { color: var(--muted); }
.search-wrap input:focus { border-color: var(--amber); }
.search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--muted); pointer-events: none;
}
.search-dropdown {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--r); display: none; z-index: 300;
  box-shadow: 0 8px 32px rgba(0,0,0,.5); max-height: 280px; overflow-y: auto;
}
.search-dropdown.open { display: block; }
.sdrop-section { padding: 6px 0; }
.sdrop-label {
  font-family: var(--font-mono); font-size: 9px; letter-spacing: .12em;
  text-transform: uppercase; color: var(--muted); padding: 4px 12px;
}
.sdrop-item {
  padding: 7px 12px; cursor: pointer; font-size: 12.5px;
  display: flex; align-items: center; gap: 8px; color: var(--soft);
}
.sdrop-item:hover { background: var(--bg3); color: var(--text); }

.header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

.hbtn {
  height: 30px; padding: 0 12px; border-radius: var(--r);
  border: 1px solid var(--border); background: transparent;
  font-family: var(--font-mono); font-size: 11px; color: var(--soft);
  cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 5px;
}
.hbtn:hover { border-color: var(--border2); color: var(--text); background: var(--bg3); }
.hbtn.primary { background: var(--amber); border-color: var(--amber); color: #0e0e0e; font-weight: 500; }
.hbtn.primary:hover { opacity: .88; }

/* stats strip */
.stats-strip {
  display: flex; align-items: center; gap: 0;
  height: 34px; flex-shrink: 0;
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 0 20px; overflow-x: auto;
}
.stat-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 0 14px; height: 100%; border-right: 1px solid var(--border);
  font-family: var(--font-mono); font-size: 11px; white-space: nowrap;
}
.stat-pill:first-child { padding-left: 0; }
.stat-pill .val { color: var(--amber); font-size: 13px; font-weight: 500; }
.stat-pill .lbl { color: var(--muted); }

/* ── Shell ──────────────────────────────────────────────────── */
.shell { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ────────────────────────────────────────────────── */
.sidebar {
  width: 200px; flex-shrink: 0;
  background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 14px 10px; gap: 2px; overflow-y: auto;
}
.nav-group-label {
  font-family: var(--font-mono); font-size: 9px; letter-spacing: .12em;
  text-transform: uppercase; color: var(--muted);
  padding: 10px 8px 5px;
}
.nav-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 9px; border-radius: var(--r);
  cursor: pointer; color: var(--soft); font-size: 13px;
  border: none; background: transparent; width: 100%; text-align: left;
  transition: all .12s;
}
.nav-item svg { color: var(--muted); flex-shrink: 0; }
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item:hover svg { color: var(--soft); }
.nav-item.active { background: var(--amber-dim); color: var(--amber); }
.nav-item.active svg { color: var(--amber); }
.nav-badge {
  margin-left: auto; background: var(--amber); color: #0e0e0e;
  font-family: var(--font-mono); font-size: 10px; font-weight: 500;
  padding: 1px 5px; border-radius: 10px; min-width: 18px; text-align: center;
}

/* organised folders section */
.folder-list { display: flex; flex-direction: column; gap: 1px; margin-top: 4px; }
.folder-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 5px 9px; border-radius: var(--r); font-size: 12px;
  color: var(--muted); cursor: default;
}
.folder-item span:first-child {
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  font-family: var(--font-mono); font-size: 11px;
}
.folder-count { color: var(--muted); font-size: 10px; flex-shrink: 0; }

/* ── Main content ────────────────────────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.toolbar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px; border-bottom: 1px solid var(--border);
  background: var(--bg2); flex-shrink: 0;
}
.page-title {
  font-family: var(--font-disp); font-size: 18px; font-weight: 400;
  color: var(--text); letter-spacing: -.01em; margin-right: auto;
}
.tb-btn {
  height: 28px; padding: 0 11px; border-radius: var(--r);
  border: 1px solid var(--border); background: transparent;
  font-family: var(--font-mono); font-size: 11px; color: var(--soft);
  cursor: pointer; transition: all .12s; display: flex; align-items: center; gap: 5px;
}
.tb-btn:hover { background: var(--bg3); color: var(--text); }
.tb-btn.active { background: var(--amber-dim); border-color: rgba(212,168,83,.3); color: var(--amber); }
.select-ctrl {
  height: 28px; padding: 0 8px; border-radius: var(--r);
  border: 1px solid var(--border); background: var(--bg2);
  font-family: var(--font-mono); font-size: 11px; color: var(--soft);
  cursor: pointer; outline: none;
}
.select-ctrl:focus { border-color: var(--amber); }

.content { flex: 1; overflow-y: auto; padding: 20px; }

/* ── Photo grid ─────────────────────────────────────────────── */
.photo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 8px;
}
.photo-grid.dense {
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 5px;
}
.photo-card {
  position: relative; border-radius: var(--r); overflow: hidden;
  aspect-ratio: 1; background: var(--bg3); cursor: pointer;
  border: 1px solid var(--border);
  transition: transform .15s, border-color .15s, box-shadow .15s;
}
.photo-card:hover {
  transform: translateY(-2px);
  border-color: var(--border2);
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
}
.photo-card img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  opacity: 0; transition: opacity .3s;
}
.photo-card img.loaded { opacity: 1; }
.photo-card .overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 16px 8px 7px;
  background: linear-gradient(transparent, rgba(14,14,14,.75));
  font-size: 10px; color: rgba(232,228,220,.7);
  opacity: 0; transition: opacity .15s;
  font-family: var(--font-mono);
}
.photo-card:hover .overlay { opacity: 1; }
.photo-card .missing-badge {
  position: absolute; top: 6px; right: 6px;
  background: var(--red-dim); border: 1px solid var(--red);
  color: var(--red); font-size: 9px; letter-spacing: .06em;
  padding: 1px 5px; border-radius: 3px; font-family: var(--font-mono);
}

/* ── Person grid ────────────────────────────────────────────── */
.person-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px;
}
.person-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px 12px; text-align: center;
  cursor: pointer; transition: all .15s;
}
.person-card:hover { border-color: var(--amber); box-shadow: 0 0 0 1px var(--amber-dim); }
.person-avatar {
  width: 68px; height: 68px; border-radius: 50%;
  background: var(--bg3); margin: 0 auto 10px;
  overflow: hidden; border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-disp); font-size: 22px; color: var(--muted);
}
.person-avatar img { width: 100%; height: 100%; object-fit: cover; }
.person-name {
  font-size: 13px; font-weight: 500; color: var(--text);
  margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.person-name-input {
  width: 100%; background: transparent; border: none;
  border-bottom: 1px solid var(--amber); color: var(--text);
  font-family: var(--font-sans); font-size: 13px; text-align: center;
  outline: none; padding-bottom: 2px; margin-bottom: 2px;
}
.person-meta { font-size: 11px; color: var(--muted); font-family: var(--font-mono); }

/* ── Merge panel ────────────────────────────────────────────── */
.merge-panel {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px 16px;
  margin-bottom: 16px; display: none;
}
.merge-panel.open { display: block; }
.merge-panel h3 { font-size: 13px; font-weight: 500; margin-bottom: 10px; color: var(--amber); }
.merge-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.merge-select {
  flex: 1; min-width: 140px; height: 30px; padding: 0 8px;
  border-radius: var(--r); border: 1px solid var(--border);
  background: var(--bg3); font-family: var(--font-mono); font-size: 11px;
  color: var(--text); outline: none;
}
.merge-select:focus { border-color: var(--amber); }

/* ── Lightbox ───────────────────────────────────────────────── */
.lightbox {
  position: fixed; inset: 0; background: rgba(8,8,8,.94);
  z-index: 1000; display: none; align-items: center; justify-content: center;
}
.lightbox.open { display: flex; }
.lb-img-wrap {
  max-width: 88vw; max-height: 88vh;
  display: flex; align-items: center; justify-content: center;
}
.lb-img-wrap img {
  max-width: 88vw; max-height: 88vh;
  object-fit: contain; border-radius: 3px;
  box-shadow: 0 0 60px rgba(0,0,0,.8);
}
.lb-close {
  position: fixed; top: 16px; right: 18px;
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,.08); border: none; cursor: pointer;
  color: var(--soft); font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.lb-close:hover { background: rgba(255,255,255,.15); color: var(--text); }
.lb-nav {
  position: fixed; top: 50%; transform: translateY(-50%);
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(255,255,255,.07); border: none; cursor: pointer;
  color: var(--soft); font-size: 22px;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.lb-nav:hover { background: rgba(255,255,255,.15); color: var(--text); }
.lb-prev { left: 14px; }
.lb-next { right: 14px; }
.lb-footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 24px 20px 14px;
  background: linear-gradient(transparent, rgba(8,8,8,.85));
  display: flex; gap: 20px; align-items: flex-end;
  font-family: var(--font-mono); font-size: 11px; color: var(--muted);
}
.lb-filename { color: var(--text); font-size: 13px; margin-right: auto; }

/* ── Empty / Loader ─────────────────────────────────────────── */
.empty {
  text-align: center; padding: 80px 20px; color: var(--muted);
}
.empty-icon { font-size: 40px; margin-bottom: 14px; }
.empty h3 { font-family: var(--font-disp); font-size: 20px; font-weight: 400; color: var(--soft); margin-bottom: 8px; }
.empty p { font-size: 12.5px; line-height: 1.6; max-width: 360px; margin: 0 auto; }

.spinner {
  width: 26px; height: 26px; border: 2px solid var(--border);
  border-top-color: var(--amber); border-radius: 50%;
  animation: spin .7s linear infinite; margin: 60px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ──────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(6px);
  background: var(--bg2); border: 1px solid var(--border);
  color: var(--text); padding: 9px 16px; border-radius: var(--r);
  font-family: var(--font-mono); font-size: 12px;
  opacity: 0; pointer-events: none; white-space: nowrap;
  transition: all .22s; z-index: 2000;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.ok { border-color: var(--green); color: var(--green); }
.toast.err { border-color: var(--red); color: var(--red); }

/* ── Responsive ─────────────────────────────────────────────── */
@media (max-width: 700px) {
  .sidebar { display: none; }
  .photo-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
  .person-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
}
</style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────── -->
<header class="header">
  <div class="logo">
    <div class="logo-icon">⬡</div>
    ImageManager
  </div>

  <div class="search-wrap">
    <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="searchInput" type="text" placeholder="search persons, filenames…">
    <div class="search-dropdown" id="searchDropdown"></div>
  </div>

  <div class="header-right">
    <button class="hbtn" onclick="loadStats()" title="Refresh stats">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
      </svg>
      Refresh
    </button>
    <button class="hbtn primary" onclick="showRunTip()">
      ▶ Run pipeline
    </button>
  </div>
</header>

<!-- ── Stats strip ────────────────────────────────────────── -->
<div class="stats-strip">
  <div class="stat-pill"><span class="val" id="s-images">—</span><span class="lbl">images</span></div>
  <div class="stat-pill"><span class="val" id="s-persons">—</span><span class="lbl">people</span></div>
  <div class="stat-pill"><span class="val" id="s-faces">—</span><span class="lbl">faces</span></div>
  <div class="stat-pill"><span class="val" id="s-clusters">—</span><span class="lbl">clusters</span></div>
</div>

<!-- ── Shell ──────────────────────────────────────────────── -->
<div class="shell">

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <span class="nav-group-label">Browse</span>
    <button class="nav-item active" data-view="photos" onclick="nav('photos',this)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      All Photos
    </button>
    <button class="nav-item" data-view="persons" onclick="nav('persons',this)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      People
      <span class="nav-badge" id="nb-persons">0</span>
    </button>
    <button class="nav-item" data-view="timeline" onclick="nav('timeline',this)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8"  y1="2" x2="8"  y2="6"/>
        <line x1="3"  y1="10" x2="21" y2="10"/>
      </svg>
      Timeline
    </button>

    <span class="nav-group-label">Output Folders</span>
    <div class="folder-list" id="folderList">
      <div style="padding:5px 8px;font-size:11px;color:var(--muted)">loading…</div>
    </div>
  </nav>

  <!-- Main -->
  <div class="main">
    <div class="toolbar" id="toolbar">
      <h1 class="page-title" id="pageTitle">All Photos</h1>
      <div id="toolbarExtras"></div>
    </div>

    <div class="content" id="content">
      <div class="spinner"></div>
    </div>
  </div>

</div><!-- /.shell -->

<!-- ── Lightbox ────────────────────────────────────────────── -->
<div class="lightbox" id="lightbox" onclick="lbBgClick(event)">
  <div class="lb-img-wrap"><img id="lbImg" src="" alt=""></div>
  <button class="lb-close" onclick="closeLb()">✕</button>
  <button class="lb-nav lb-prev" onclick="lbNav(-1)">‹</button>
  <button class="lb-nav lb-next" onclick="lbNav(+1)">›</button>
  <div class="lb-footer">
    <span class="lb-filename" id="lbFilename"></span>
    <span id="lbDate"></span>
  </div>
</div>

<!-- ── Toast ────────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════════════
const API = 'http://localhost:5050/api';

const S = {
  view: 'photos',
  photos: [],       // current grid photos
  lbIdx: 0,        // lightbox index
  page: 1,
  total: 0,
  sort: 'processed_desc',
  density: 'normal',
  personId: null,
  personName: '',
  persons: [],      // cache for merge dropdowns
};

// ═══════════════════════════════════════════════════════════════
// Boot
// ═══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  loadStats();
  loadFolders();
  renderPhotos();
  initSearch();
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLb();
    if (document.getElementById('lightbox').classList.contains('open')) {
      if (e.key === 'ArrowRight') lbNav(+1);
      if (e.key === 'ArrowLeft')  lbNav(-1);
    }
  });
});

// ═══════════════════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════════════════
async function GET(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  return r.json();
}
async function PATCH(path, body) {
  const r = await fetch(API + path, {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error(`${r.status}`);
  return r.json();
}
async function POST(path, body) {
  const r = await fetch(API + path, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error(`${r.status}`);
  return r.json();
}

// ═══════════════════════════════════════════════════════════════
// Stats + folders
// ═══════════════════════════════════════════════════════════════
async function loadStats() {
  try {
    const d = await GET('/stats');
    document.getElementById('s-images').textContent   = fmt(d.total_images);
    document.getElementById('s-persons').textContent  = fmt(d.total_persons);
    document.getElementById('s-faces').textContent    = fmt(d.total_faces);
    document.getElementById('s-clusters').textContent = fmt(d.total_clusters);
    document.getElementById('nb-persons').textContent = d.total_persons || 0;
  } catch(e) { /* server may not be running */ }
}

async function loadFolders() {
  try {
    const d = await GET('/organised');
    const el = document.getElementById('folderList');
    if (!d.folders?.length) {
      el.innerHTML = `<div style="padding:5px 8px;font-size:11px;color:var(--muted)">no output yet</div>`;
      return;
    }
    el.innerHTML = d.folders.map(f => `
      <div class="folder-item">
        <span title="${esc(f.name)}">${esc(f.name)}</span>
        <span class="folder-count">${f.count}</span>
      </div>`).join('');
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════════════
// Navigation
// ═══════════════════════════════════════════════════════════════
function nav(view, el, extra = {}) {
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  if (el) el.classList.add('active');
  S.view = view;
  S.page = 1;
  S.photos = [];
  Object.assign(S, extra);

  const titles = {
    photos: 'All Photos', persons: 'People', timeline: 'Timeline',
    person_photos: S.personName,
  };
  document.getElementById('pageTitle').textContent = titles[view] || view;
  document.getElementById('toolbarExtras').innerHTML = '';

  // Build toolbar extras per view
  if (view === 'photos' || view === 'person_photos') {
    document.getElementById('toolbarExtras').innerHTML = `
      <select class="select-ctrl" onchange="S.sort=this.value;${view==='photos'?'renderPhotos()':'renderPersonPhotos()'}">
        <option value="processed_desc">Newest first</option>
        <option value="processed_asc">Oldest first</option>
        <option value="filename_asc">A → Z</option>
        <option value="filename_desc">Z → A</option>
      </select>
      <button class="tb-btn active" id="btn-normal" onclick="setDensity('normal',this)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
      </button>
      <button class="tb-btn" id="btn-dense" onclick="setDensity('dense',this)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="2" width="4" height="4"/><rect x="10" y="2" width="4" height="4"/>
          <rect x="18" y="2" width="4" height="4"/><rect x="2" y="10" width="4" height="4"/>
          <rect x="10" y="10" width="4" height="4"/><rect x="18" y="10" width="4" height="4"/>
          <rect x="2" y="18" width="4" height="4"/><rect x="10" y="18" width="4" height="4"/>
          <rect x="18" y="18" width="4" height="4"/>
        </svg>
      </button>`;

    if (view === 'person_photos') {
      document.getElementById('toolbarExtras').insertAdjacentHTML('afterbegin', `
        <button class="tb-btn" onclick="nav('persons',document.querySelector('[data-view=persons]'))">← Back</button>
      `);
    }
  }

  const renders = {
    photos: renderPhotos,
    persons: renderPersons,
    timeline: renderTimeline,
    person_photos: renderPersonPhotos,
  };
  (renders[view] || renderPhotos)();
}

function setDensity(d, btn) {
  S.density = d;
  document.querySelectorAll('.tb-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const g = document.getElementById('photoGrid');
  if (g) g.className = `photo-grid${d === 'dense' ? ' dense' : ''}`;
}

// ═══════════════════════════════════════════════════════════════
// Photos view
// ═══════════════════════════════════════════════════════════════
async function renderPhotos() {
  const c = document.getElementById('content');
  c.innerHTML = '<div class="spinner"></div>';
  try {
    const d = await GET(`/images?page=1&per_page=80&sort=${S.sort}`);
    S.photos = d.images;
    S.total  = d.total;
    paintGrid(c, d.images, d.total, 'renderPhotos');
  } catch(e) {
    c.innerHTML = empty('📷', 'No photos found',
      'Run <code>python main.py</code> to process your photo folder, then refresh.');
  }
}

async function renderPersonPhotos() {
  const c = document.getElementById('content');
  c.innerHTML = '<div class="spinner"></div>';
  try {
    const d = await GET(`/persons/${S.personId}/images?page=1&per_page=80&sort=${S.sort}`);
    S.photos = d.images;
    S.total  = d.total;
    paintGrid(c, d.images, d.total, 'renderPersonPhotos');
  } catch(e) {
    c.innerHTML = empty('📷', 'No photos', 'No processed photos found for this person.');
  }
}

function paintGrid(container, images, total, loadMoreFn) {
  if (!images.length) {
    container.innerHTML = empty('📷', 'No photos here', 'Process some images first.');
    return;
  }
  const cls = `photo-grid${S.density === 'dense' ? ' dense' : ''}`;
  container.innerHTML = `
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-bottom:12px">
      ${total.toLocaleString()} image${total !== 1 ? 's' : ''}
    </div>
    <div class="${cls}" id="photoGrid">
      ${images.map((img, i) => photoCard(img, i)).join('')}
    </div>
    ${total > images.length ? `
      <div style="text-align:center;padding:24px">
        <button class="tb-btn" style="padding:0 20px;height:32px" onclick="${loadMoreFn}More()">
          Load more
        </button>
      </div>` : ''}
  `;
  lazyLoad();
}

function photoCard(img, i) {
  const name = img.filename || img.file_path?.split('/').pop() || '—';
  const date = img.processed_at
    ? new Date(img.processed_at).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'})
    : '';
  return `
    <div class="photo-card" onclick="openLb(${i})">
      <img data-src="${API}/images/${img.id}/thumbnail" alt="${esc(name)}"
           onerror="this.style.opacity='.15'">
      ${img.exists === false ? '<div class="missing-badge">MISSING</div>' : ''}
      <div class="overlay">${esc(name.substring(0,24))}${name.length>24?'…':''}<br>${date}</div>
    </div>`;
}

async function renderPhotosMore() {
  S.page++;
  const d = await GET(`/images?page=${S.page}&per_page=80&sort=${S.sort}`);
  const prevLen = S.photos.length;
  S.photos.push(...d.images);
  const grid = document.getElementById('photoGrid');
  if (grid) {
    grid.insertAdjacentHTML('beforeend',
      d.images.map((img, i) => photoCard(img, prevLen + i)).join(''));
    lazyLoad();
  }
}
async function renderPersonPhotosMore() {
  S.page++;
  const d = await GET(`/persons/${S.personId}/images?page=${S.page}&per_page=80`);
  const prevLen = S.photos.length;
  S.photos.push(...d.images);
  const grid = document.getElementById('photoGrid');
  if (grid) {
    grid.insertAdjacentHTML('beforeend',
      d.images.map((img, i) => photoCard(img, prevLen + i)).join(''));
    lazyLoad();
  }
}

// ═══════════════════════════════════════════════════════════════
// Persons view
// ═══════════════════════════════════════════════════════════════
async function renderPersons() {
  const c = document.getElementById('content');
  c.innerHTML = '<div class="spinner"></div>';
  try {
    const d = await GET('/persons');
    S.persons = d.persons;
    if (!d.persons?.length) {
      c.innerHTML = empty('👤', 'No people identified',
        'Run <code>python main.py</code> on a folder with face photos to detect people.');
      return;
    }
    c.innerHTML = `
      <div id="mergePanel" class="merge-panel">
        <h3>⇄ Merge two people</h3>
        <div class="merge-row">
          <select class="merge-select" id="mergeSource">
            ${d.persons.map(p => `<option value="${p.id}">${esc(p.name)} (${p.photo_count} photos)</option>`).join('')}
          </select>
          <span style="color:var(--muted);font-size:12px">→ into →</span>
          <select class="merge-select" id="mergeTarget">
            ${d.persons.map(p => `<option value="${p.id}">${esc(p.name)} (${p.photo_count} photos)</option>`).join('')}
          </select>
          <button class="tb-btn" onclick="doMerge()" style="color:var(--amber)">Merge</button>
          <button class="tb-btn" onclick="toggleMerge()">Cancel</button>
        </div>
      </div>

      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">
          ${d.persons.length} people · double-click name to rename
        </span>
        <button class="tb-btn" onclick="toggleMerge()">⇄ Merge people…</button>
      </div>

      <div class="person-grid">
        ${d.persons.map(p => personCard(p)).join('')}
      </div>`;
  } catch(e) {
    c.innerHTML = empty('👤', 'Error loading people', 'Check that the API server is running.');
  }
}

function personCard(p) {
  const initials = p.name.trim().slice(0, 2).toUpperCase();
  const thumbSrc = p.sample_face_id
    ? `${API}/faces/${p.sample_face_id}/crop`
    : '';
  const avatarHtml = thumbSrc
    ? `<img src="${thumbSrc}" alt="${esc(p.name)}" onerror="this.style.display='none'">`
    : `<span>${initials}</span>`;

  return `
    <div class="person-card" onclick="openPerson(${p.id},'${escAttr(p.name)}')">
      <div class="person-avatar">${avatarHtml}</div>
      <div class="person-name" id="pn-${p.id}"
           ondblclick="startRename(event,${p.id})"
           title="Double-click to rename">${esc(p.name)}</div>
      <div class="person-meta">${p.photo_count} photos · ${p.face_count} faces</div>
    </div>`;
}

function openPerson(id, name) {
  nav('person_photos', null, {personId: id, personName: name});
  document.getElementById('pageTitle').textContent = name;
}

function toggleMerge() {
  document.getElementById('mergePanel').classList.toggle('open');
}

async function doMerge() {
  const src = parseInt(document.getElementById('mergeSource').value);
  const tgt = parseInt(document.getElementById('mergeTarget').value);
  if (src === tgt) { toast('Source and target must be different', 'err'); return; }
  const srcName = S.persons.find(p => p.id === src)?.name;
  const tgtName = S.persons.find(p => p.id === tgt)?.name;
  if (!confirm(`Merge "${srcName}" into "${tgtName}"?\n\nThis cannot be undone.`)) return;
  try {
    await POST('/persons/merge', {source_id: src, target_id: tgt});
    toast(`Merged ${srcName} → ${tgtName}`, 'ok');
    loadStats();
    renderPersons();
  } catch(e) {
    toast('Merge failed: ' + e.message, 'err');
  }
}

// rename
async function startRename(event, personId) {
  event.stopPropagation();
  const el  = document.getElementById(`pn-${personId}`);
  const old = el.textContent.trim();
  el.innerHTML = `<input class="person-name-input" value="${escAttr(old)}" onclick="event.stopPropagation()">`;
  const inp = el.querySelector('input');
  inp.focus(); inp.select();
  const commit = () => doRename(personId, inp.value, el, old);
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter')  inp.blur();
    if (e.key === 'Escape') { el.textContent = old; }
  });
}

async function doRename(id, newName, el, fallback) {
  newName = newName.trim();
  if (!newName || newName === fallback) { el.textContent = fallback; return; }
  try {
    await PATCH(`/persons/${id}`, {name: newName});
    el.textContent = newName;
    toast(`Renamed → ${newName}`, 'ok');
    loadStats();
    loadFolders();
  } catch(e) {
    el.textContent = fallback;
    toast('Rename failed: ' + e.message, 'err');
  }
}

// ═══════════════════════════════════════════════════════════════
// Timeline view
// ═══════════════════════════════════════════════════════════════
async function renderTimeline() {
  const c = document.getElementById('content');
  c.innerHTML = '<div class="spinner"></div>';
  try {
    const d = await GET('/timeline');
    if (!d.timeline?.length) {
      c.innerHTML = empty('📅', 'No timeline data',
        'Photos need to be processed with timestamps to generate a timeline.');
      return;
    }
    c.innerHTML = d.timeline.map(m => {
      const [y, mo] = m.month.split('-');
      const label = new Date(+y, +mo - 1).toLocaleDateString('en-US', {month:'long', year:'numeric'});
      return `
        <div style="margin-bottom:28px" data-month="${m.month}">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
            <span style="font-family:var(--font-disp);font-size:16px;font-weight:400;color:var(--text)">${label}</span>
            <span style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">${m.count} images</span>
            <div style="flex:1;height:1px;background:var(--border)"></div>
          </div>
          <div style="color:var(--muted);font-size:12px;padding:8px 0">
            Showing counts only — browse All Photos for full grid view.
          </div>
        </div>`;
    }).join('');
  } catch(e) {
    c.innerHTML = empty('📅', 'Error', 'Could not load timeline.');
  }
}

// ═══════════════════════════════════════════════════════════════
// Lightbox
// ═══════════════════════════════════════════════════════════════
function openLb(idx) {
  if (!S.photos.length) return;
  S.lbIdx = idx;
  paintLb(idx);
  document.getElementById('lightbox').classList.add('open');
}
function paintLb(idx) {
  const img = S.photos[idx];
  if (!img) return;
  document.getElementById('lbImg').src = `${API}/images/${img.id}/full`;
  document.getElementById('lbFilename').textContent = img.filename || img.file_path?.split('/').pop() || '';
  document.getElementById('lbDate').textContent = img.processed_at
    ? new Date(img.processed_at).toLocaleDateString('en-GB', {day:'numeric',month:'long',year:'numeric'})
    : '';
}
function closeLb() {
  document.getElementById('lightbox').classList.remove('open');
}
function lbBgClick(e) {
  if (e.target === e.currentTarget) closeLb();
}
function lbNav(dir) {
  const n = S.lbIdx + dir;
  if (n >= 0 && n < S.photos.length) { S.lbIdx = n; paintLb(n); }
}

// ═══════════════════════════════════════════════════════════════
// Search
// ═══════════════════════════════════════════════════════════════
function initSearch() {
  const inp = document.getElementById('searchInput');
  const drop = document.getElementById('searchDropdown');
  let timer;

  inp.addEventListener('input', () => {
    clearTimeout(timer);
    const q = inp.value.trim();
    if (!q) { drop.classList.remove('open'); return; }
    timer = setTimeout(() => doSearch(q), 280);
  });
  inp.addEventListener('blur', () => setTimeout(() => drop.classList.remove('open'), 200));
  inp.addEventListener('focus', () => { if (inp.value.trim()) drop.classList.add('open'); });
}

async function doSearch(q) {
  const drop = document.getElementById('searchDropdown');
  try {
    const d = await GET(`/search?q=${encodeURIComponent(q)}`);
    let html = '';
    if (d.persons?.length) {
      html += `<div class="sdrop-section">
        <div class="sdrop-label">People</div>
        ${d.persons.map(p => `
          <div class="sdrop-item"
               onclick="openPerson(${p.id},'${escAttr(p.name)}');document.getElementById('searchInput').value=''">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            ${esc(p.name)}
          </div>`).join('')}
      </div>`;
    }
    if (d.images?.length) {
      html += `<div class="sdrop-section">
        <div class="sdrop-label">Images</div>
        ${d.images.map(img => `
          <div class="sdrop-item">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
            </svg>
            ${esc(img.filename)}
          </div>`).join('')}
      </div>`;
    }
    if (!html) html = `<div class="sdrop-section"><div class="sdrop-item" style="color:var(--muted)">No results for "${esc(q)}"</div></div>`;
    drop.innerHTML = html;
    drop.classList.add('open');
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════════════
// Lazy image loading
// ═══════════════════════════════════════════════════════════════
function lazyLoad() {
  const imgs = document.querySelectorAll('img[data-src]');
  if (!('IntersectionObserver' in window)) {
    imgs.forEach(i => { i.src = i.dataset.src; delete i.dataset.src; });
    return;
  }
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const i = e.target;
        i.src = i.dataset.src;
        delete i.dataset.src;
        i.addEventListener('load', () => i.classList.add('loaded'), {once:true});
        io.unobserve(i);
      }
    });
  }, {rootMargin: '120px'});
  imgs.forEach(i => io.observe(i));
}

// ═══════════════════════════════════════════════════════════════
// Misc helpers
// ═══════════════════════════════════════════════════════════════
function fmt(n) { return n != null ? Number(n).toLocaleString() : '—'; }
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) { return String(s ?? '').replace(/'/g, "\\'"); }
function empty(icon, title, msg) {
  return `<div class="empty">
    <div class="empty-icon">${icon}</div>
    <h3>${title}</h3>
    <p>${msg}</p>
  </div>`;
}

let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}

function showRunTip() {
  toast('python main.py  — runs the full pipeline in your terminal', '');
}
