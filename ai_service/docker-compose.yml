version: '3.8'

services:
  ai-service:
    build: .
    container_name: imagemanager-ai-service
    ports:
      - "8000:8000"
    environment:
      - TF_ENABLE_ONEDNN_OPTS=0
    volumes:
      - model_cache:/root/.deepface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  model_cache:
    driver: local
