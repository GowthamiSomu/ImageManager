<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImageManager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=JetBrains+Mono:wght@300;400;500&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Reset & Design Tokens ──────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #0f0f0f;
  --surface:    #171717;
  --surface2:   #1f1f1f;
  --surface3:   #272727;
  --border:     #2c2c2c;
  --border2:    #3a3a3a;
  --text:       #f0ece4;
  --text2:      #b8b4ac;
  --muted:      #6a6660;
  --gold:       #c8974a;
  --gold-dim:   rgba(200,151,74,0.12);
  --gold-glow:  rgba(200,151,74,0.06);
  --emerald:    #4a9b7a;
  --emerald-dim:rgba(74,155,122,0.12);
  --rose:       #c45a5a;
  --rose-dim:   rgba(196,90,90,0.12);
  --sky:        #5a8fc4;
  --sky-dim:    rgba(90,143,196,0.12);
  --violet:     #8b6fc4;
  --r:          8px;
  --r-sm:       5px;
  --mono:       'JetBrains Mono', monospace;
  --sans:       'Manrope', sans-serif;
  --display:    'Lora', serif;
  --shadow:     0 4px 24px rgba(0,0,0,0.5);
}

html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.6;
  display: flex; flex-direction: column;
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #4a4a4a; }

/* ── Header ─────────────────────────────────────────────────── */
.header {
  display: flex; align-items: center;
  height: 56px; flex-shrink: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 18px;
  gap: 12px;
  position: relative; z-index: 200;
}

.logo {
  font-family: var(--display);
  font-size: 18px; font-weight: 600;
  color: var(--gold);
  display: flex; align-items: center; gap: 9px;
  flex-shrink: 0; margin-right: 8px;
  letter-spacing: -0.01em;
}
.logo-mark {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, var(--gold-dim), transparent);
  border: 1px solid rgba(200,151,74,0.35);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
}

/* Search */
.search-wrap { position: relative; flex: 1; max-width: 400px; }
.search-input {
  width: 100%; height: 34px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 17px; padding: 0 14px 0 36px;
  font-family: var(--mono); font-size: 11.5px; color: var(--text);
  outline: none; transition: border .15s, background .15s;
}
.search-input::placeholder { color: var(--muted); }
.search-input:focus { border-color: var(--gold); background: var(--surface3); }
.search-icon {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  color: var(--muted); pointer-events: none;
}
.sdrop {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); display: none; z-index: 400;
  box-shadow: var(--shadow); max-height: 300px; overflow-y: auto;
}
.sdrop.open { display: block; }
.sdrop-section { padding: 6px 0; }
.sdrop-label {
  font-family: var(--mono); font-size: 9px; letter-spacing: .14em;
  text-transform: uppercase; color: var(--muted); padding: 4px 12px 2px;
}
.sdrop-item {
  padding: 8px 12px; cursor: pointer; font-size: 12.5px;
  display: flex; align-items: center; gap: 8px; color: var(--text2);
  transition: background .1s;
}
.sdrop-item:hover { background: var(--surface2); color: var(--text); }

.header-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }

.hbtn {
  height: 32px; padding: 0 13px; border-radius: 16px;
  border: 1px solid var(--border); background: transparent;
  font-family: var(--sans); font-size: 12px; font-weight: 500;
  color: var(--text2); cursor: pointer;
  transition: all .15s; display: flex; align-items: center; gap: 6px;
}
.hbtn:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }
.hbtn.accent { background: var(--gold); border-color: var(--gold); color: #0f0f0f; }
.hbtn.accent:hover { opacity: .88; }

/* Stats bar */
.statsbar {
  display: flex; align-items: center;
  height: 36px; flex-shrink: 0;
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 18px; gap: 0;
}
.stat {
  display: flex; align-items: center; gap: 7px;
  padding: 0 16px; height: 100%; border-right: 1px solid var(--border);
  font-family: var(--mono); font-size: 11px; white-space: nowrap;
}
.stat:first-child { padding-left: 0; }
.stat .v { color: var(--gold); font-size: 13px; font-weight: 500; }
.stat .l { color: var(--muted); }

/* ── Shell ──────────────────────────────────────────────────── */
.shell { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ────────────────────────────────────────────────── */
.sidebar {
  width: 210px; flex-shrink: 0;
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow-y: auto;
}
.nav-section {
  padding: 12px 8px 6px;
}
.nav-label {
  font-family: var(--mono); font-size: 9px; letter-spacing: .14em;
  text-transform: uppercase; color: var(--muted);
  padding: 0 8px 6px;
}
.nav-btn {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 9px; border-radius: var(--r-sm);
  cursor: pointer; color: var(--text2); font-size: 13px; font-weight: 500;
  border: none; background: transparent; width: 100%; text-align: left;
  transition: all .12s;
}
.nav-btn svg { color: var(--muted); flex-shrink: 0; transition: color .12s; }
.nav-btn:hover { background: var(--surface2); color: var(--text); }
.nav-btn:hover svg { color: var(--text2); }
.nav-btn.active { background: var(--gold-dim); color: var(--gold); }
.nav-btn.active svg { color: var(--gold); }
.nav-badge {
  margin-left: auto; background: var(--gold); color: #0f0f0f;
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  padding: 1px 6px; border-radius: 10px; min-width: 20px; text-align: center;
}
.nav-badge.rose { background: var(--rose); color: #fff; }
.nav-badge.sky  { background: var(--sky); color: #fff; }

/* Folder list in sidebar */
.folder-list { padding: 0 8px 12px; display: flex; flex-direction: column; gap: 1px; }
.folder-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 5px 9px; border-radius: var(--r-sm);
  font-size: 11.5px; color: var(--muted);
}
.folder-row span:first-child {
  font-family: var(--mono); font-size: 11px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.folder-cnt { font-size: 10px; flex-shrink: 0; }

/* ── Main ───────────────────────────────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.toolbar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 18px; border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0;
}
.page-title {
  font-family: var(--display); font-size: 17px; font-weight: 500;
  color: var(--text); letter-spacing: -.01em; margin-right: auto;
}
.tb-btn {
  height: 30px; padding: 0 12px; border-radius: 15px;
  border: 1px solid var(--border); background: transparent;
  font-family: var(--sans); font-size: 11.5px; font-weight: 500;
  color: var(--text2); cursor: pointer; transition: all .12s;
  display: flex; align-items: center; gap: 5px;
}
.tb-btn:hover { background: var(--surface2); color: var(--text); }
.tb-btn.on { background: var(--gold-dim); border-color: rgba(200,151,74,.35); color: var(--gold); }
.sel-ctrl {
  height: 30px; padding: 0 10px; border-radius: 15px;
  border: 1px solid var(--border); background: var(--surface);
  font-family: var(--mono); font-size: 11px; color: var(--text2);
  cursor: pointer; outline: none;
}
.sel-ctrl:focus { border-color: var(--gold); }

.content { flex: 1; overflow-y: auto; padding: 18px; }

/* ── Photo grid ─────────────────────────────────────────────── */
.photo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(176px, 1fr));
  gap: 8px;
}
.photo-grid.dense {
  grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
  gap: 4px;
}
.photo-card {
  position: relative; border-radius: var(--r); overflow: hidden;
  aspect-ratio: 1; background: var(--surface2); cursor: pointer;
  border: 1px solid var(--border);
  transition: transform .15s, border-color .15s, box-shadow .15s;
}
.photo-card:hover { transform: translateY(-2px); border-color: var(--border2); box-shadow: var(--shadow); }
.photo-card img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0; transition: opacity .35s; }
.photo-card img.loaded { opacity: 1; }
.photo-card .ov {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 20px 8px 7px;
  background: linear-gradient(transparent, rgba(15,15,15,.82));
  font-size: 10px; color: rgba(240,236,228,.75);
  opacity: 0; transition: opacity .15s; font-family: var(--mono);
}
.photo-card:hover .ov { opacity: 1; }
.miss-badge {
  position: absolute; top: 6px; right: 6px;
  background: var(--rose-dim); border: 1px solid var(--rose);
  color: var(--rose); font-size: 9px; padding: 1px 5px;
  border-radius: 3px; font-family: var(--mono);
}

/* ── Person grid (Google Photos style) ──────────────────────── */
.person-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 14px;
}
.person-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 18px 12px 14px; text-align: center;
  cursor: pointer; transition: all .18s; position: relative;
}
.person-card:hover { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold-dim), var(--shadow); transform: translateY(-1px); }
.person-avatar {
  width: 76px; height: 76px; border-radius: 50%;
  background: var(--surface2); margin: 0 auto 12px;
  overflow: hidden; border: 2.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--display); font-size: 26px; color: var(--muted);
  transition: border-color .18s;
  position: relative;
}
.person-card:hover .person-avatar { border-color: var(--gold); }
.person-avatar img { width: 100%; height: 100%; object-fit: cover; }
.person-avatar-ring {
  position: absolute; inset: -4px; border-radius: 50%;
  border: 2px solid transparent;
  background: linear-gradient(135deg, var(--gold), transparent) border-box;
  -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: destination-out; mask-composite: exclude;
  opacity: 0; transition: opacity .18s;
}
.person-card:hover .person-avatar-ring { opacity: 1; }
.person-name {
  font-size: 13px; font-weight: 600; color: var(--text);
  margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.person-name-inp {
  width: 100%; background: transparent; border: none;
  border-bottom: 1.5px solid var(--gold); color: var(--text);
  font-family: var(--sans); font-size: 13px; font-weight: 600;
  text-align: center; outline: none; padding-bottom: 2px;
}
.person-meta { font-size: 11px; color: var(--muted); font-family: var(--mono); }
.person-more-badge {
  position: absolute; top: 10px; right: 10px;
  background: var(--surface3); border: 1px solid var(--border);
  color: var(--muted); font-size: 9px; font-family: var(--mono);
  padding: 2px 6px; border-radius: 4px;
}

/* ── Duplicates panel ───────────────────────────────────────── */
.dup-grid { display: flex; flex-direction: column; gap: 12px; }
.dup-pair {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden;
  display: grid; grid-template-columns: 1fr 1fr 200px;
  min-height: 200px;
}
.dup-img-side {
  position: relative; cursor: pointer;
  background: var(--surface2); overflow: hidden;
}
.dup-img-side img { width: 100%; height: 100%; object-fit: cover; display: block; }
.dup-img-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 20px 10px 8px;
  background: linear-gradient(transparent, rgba(15,15,15,.85));
  font-family: var(--mono); font-size: 10px; color: var(--text2);
}
.dup-img-side.selected { outline: 3px solid var(--emerald); outline-offset: -3px; }
.dup-img-side.to-delete { outline: 3px solid var(--rose); outline-offset: -3px; }
.dup-actions {
  background: var(--surface2); border-left: 1px solid var(--border);
  padding: 16px; display: flex; flex-direction: column; gap: 10px;
  justify-content: center;
}
.dup-sim {
  font-family: var(--mono); font-size: 11px; color: var(--muted);
  text-align: center; margin-bottom: 6px;
}
.dup-sim strong { color: var(--gold); font-size: 14px; display: block; margin-bottom: 2px; }
.dup-del-chk {
  display: flex; align-items: center; gap: 6px;
  font-size: 11.5px; color: var(--text2); cursor: pointer;
}
.action-btn {
  width: 100%; padding: 8px; border-radius: var(--r-sm);
  border: 1px solid; font-family: var(--sans); font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all .15s; text-align: center;
}
.action-btn.keep-a { border-color: var(--emerald); color: var(--emerald); background: transparent; }
.action-btn.keep-a:hover { background: var(--emerald-dim); }
.action-btn.keep-b { border-color: var(--sky); color: var(--sky); background: transparent; }
.action-btn.keep-b:hover { background: var(--sky-dim); }
.action-btn.skip { border-color: var(--border); color: var(--muted); background: transparent; }
.action-btn.skip:hover { background: var(--surface3); color: var(--text2); }

/* ── Classify panel ─────────────────────────────────────────── */
.classify-summary {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
  margin-bottom: 20px;
}
.classify-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 18px; text-align: center;
  transition: border-color .15s;
}
.classify-card:hover { border-color: var(--border2); }
.classify-icon { font-size: 28px; margin-bottom: 8px; }
.classify-count { font-family: var(--display); font-size: 32px; color: var(--gold); }
.classify-label { font-size: 12px; color: var(--muted); margin-top: 2px; }
.classify-action {
  margin-top: 12px; padding: 7px 14px; border-radius: 15px;
  border: 1px solid var(--border); background: transparent;
  font-family: var(--sans); font-size: 11.5px; color: var(--text2);
  cursor: pointer; transition: all .15s;
}
.classify-action:hover { background: var(--surface2); color: var(--text); }
.classify-action.active { background: var(--gold-dim); border-color: rgba(200,151,74,.35); color: var(--gold); }

.classify-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px;
  max-height: 400px; overflow-y: auto; border-radius: var(--r);
  padding: 4px; background: var(--surface2);
}
.classify-thumb {
  aspect-ratio: 1; border-radius: var(--r-sm); overflow: hidden;
  background: var(--surface3); position: relative;
}
.classify-thumb img { width: 100%; height: 100%; object-fit: cover; }
.classify-thumb-name {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 14px 6px 4px;
  background: linear-gradient(transparent, rgba(15,15,15,.9));
  font-size: 9px; color: var(--text2); font-family: var(--mono);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Merge modal ────────────────────────────────────────────── */
.merge-bar {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px 16px; margin-bottom: 18px;
  display: none;
}
.merge-bar.open { display: block; }
.merge-bar h3 { font-size: 13px; font-weight: 600; color: var(--gold); margin-bottom: 10px; }
.merge-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.merge-sel {
  flex: 1; min-width: 140px; height: 32px; padding: 0 10px;
  border-radius: var(--r-sm); border: 1px solid var(--border);
  background: var(--surface3); font-family: var(--mono); font-size: 11px;
  color: var(--text); outline: none;
}
.merge-sel:focus { border-color: var(--gold); }

/* ── Lightbox ───────────────────────────────────────────────── */
.lb {
  position: fixed; inset: 0; background: rgba(10,10,10,.96);
  z-index: 1000; display: none; align-items: center; justify-content: center;
}
.lb.open { display: flex; }
.lb-wrap { max-width: 88vw; max-height: 88vh; }
.lb-wrap img { max-width: 88vw; max-height: 88vh; object-fit: contain; border-radius: 4px; box-shadow: 0 0 80px rgba(0,0,0,.9); }
.lb-x {
  position: fixed; top: 14px; right: 16px;
  width: 38px; height: 38px; border-radius: 50%;
  background: rgba(255,255,255,.07); border: none; cursor: pointer;
  color: var(--text2); font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.lb-x:hover { background: rgba(255,255,255,.14); }
.lb-nav {
  position: fixed; top: 50%; transform: translateY(-50%);
  width: 42px; height: 42px; border-radius: 50%;
  background: rgba(255,255,255,.06); border: none; cursor: pointer;
  color: var(--text2); font-size: 24px;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.lb-nav:hover { background: rgba(255,255,255,.13); }
.lb-nav.prev { left: 14px; }
.lb-nav.next { right: 14px; }
.lb-footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 28px 20px 14px;
  background: linear-gradient(transparent, rgba(10,10,10,.9));
  font-family: var(--mono); font-size: 11px; color: var(--muted);
  display: flex; gap: 16px; align-items: flex-end;
}
.lb-fname { color: var(--text); font-size: 13px; margin-right: auto; }

/* ── Spinner / Empty ────────────────────────────────────────── */
.spinner {
  width: 28px; height: 28px; border: 2px solid var(--border);
  border-top-color: var(--gold); border-radius: 50%;
  animation: spin .7s linear infinite; margin: 80px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 80px 20px; color: var(--muted); }
.empty-icon { font-size: 42px; margin-bottom: 16px; }
.empty h3 { font-family: var(--display); font-size: 20px; font-weight: 500; color: var(--text2); margin-bottom: 8px; }
.empty p { font-size: 12.5px; max-width: 360px; margin: 0 auto; line-height: 1.65; }

/* ── Toast ──────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%) translateY(8px);
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); padding: 9px 18px; border-radius: 20px;
  font-family: var(--mono); font-size: 12px;
  opacity: 0; pointer-events: none; white-space: nowrap;
  transition: all .22s; z-index: 2000; box-shadow: var(--shadow);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.ok  { border-color: var(--emerald); color: var(--emerald); }
.toast.err { border-color: var(--rose); color: var(--rose); }

/* ── Responsive ─────────────────────────────────────────────── */
@media (max-width: 680px) {
  .sidebar { display: none; }
  .photo-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
  .person-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
  .dup-pair { grid-template-columns: 1fr 1fr; }
  .dup-actions { grid-column: span 2; border-left: none; border-top: 1px solid var(--border); }
  .classify-summary { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="logo">
    <div class="logo-mark">⬡</div>
    ImageManager
  </div>

  <div class="search-wrap">
    <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="searchInput" class="search-input" type="text" placeholder="search people, filenames…">
    <div class="sdrop" id="searchDrop"></div>
  </div>

  <div class="header-actions">
    <button class="hbtn" onclick="loadStats()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
      </svg>
      Refresh
    </button>
    <button class="hbtn accent" onclick="toast('Run: python main.py in your terminal','')">
      ▶ Run pipeline
    </button>
  </div>
</header>

<!-- Stats bar -->
<div class="statsbar">
  <div class="stat"><span class="v" id="s-images">—</span><span class="l">images</span></div>
  <div class="stat"><span class="v" id="s-persons">—</span><span class="l">people</span></div>
  <div class="stat"><span class="v" id="s-faces">—</span><span class="l">faces</span></div>
  <div class="stat"><span class="v" id="s-clusters">—</span><span class="l">clusters</span></div>
</div>

<!-- Shell -->
<div class="shell">

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="nav-section">
      <div class="nav-label">Browse</div>
      <button class="nav-btn active" data-view="photos" onclick="nav('photos',this)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
        </svg>
        All Photos
      </button>
      <button class="nav-btn" data-view="persons" onclick="nav('persons',this)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        People
        <span class="nav-badge" id="nb-persons">0</span>
      </button>
      <button class="nav-btn" data-view="timeline" onclick="nav('timeline',this)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Timeline
      </button>
    </div>

    <div class="nav-section">
      <div class="nav-label">Review & Clean</div>
      <button class="nav-btn" data-view="duplicates" onclick="nav('duplicates',this)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        Near-Duplicates
        <span class="nav-badge rose" id="nb-dups">?</span>
      </button>
      <button class="nav-btn" data-view="classify" onclick="nav('classify',this)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        Docs & Screenshots
        <span class="nav-badge sky" id="nb-classify">?</span>
      </button>
    </div>

    <div class="nav-section">
      <div class="nav-label">Output Folders</div>
    </div>
    <div class="folder-list" id="folderList">
      <div style="padding:4px 8px;font-size:11px;color:var(--muted)">loading…</div>
    </div>
  </nav>

  <!-- Main content -->
  <div class="main">
    <div class="toolbar" id="toolbar">
      <h1 class="page-title" id="pageTitle">All Photos</h1>
      <div id="toolbarExtras"></div>
    </div>
    <div class="content" id="content">
      <div class="spinner"></div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lb" id="lb" onclick="lbBgClick(event)">
  <div class="lb-wrap"><img id="lbImg" src="" alt=""></div>
  <button class="lb-x" onclick="lbClose()">✕</button>
  <button class="lb-nav prev" onclick="lbNav(-1)">‹</button>
  <button class="lb-nav next" onclick="lbNav(+1)">›</button>
  <div class="lb-footer">
    <span class="lb-fname" id="lbFname"></span>
    <span id="lbDate"></span>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══ State ═══════════════════════════════════════════════════
const API = 'http://localhost:5050/api';
const S = {
  view: 'photos',
  photos: [], lbIdx: 0,
  page: 1, total: 0, sort: 'processed_desc', density: 'normal',
  personId: null, personName: '',
  persons: [],
  dupPairs: [], dupIdx: 0,
  classifyData: null,
};

// ═══ Boot ════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  loadStats();
  loadFolders();
  renderPhotos();
  initSearch();
  prefetchDupCount();
  prefetchClassifyCount();
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') lbClose();
    if (document.getElementById('lb').classList.contains('open')) {
      if (e.key === 'ArrowRight') lbNav(+1);
      if (e.key === 'ArrowLeft')  lbNav(-1);
    }
  });
});

// ═══ API helpers ══════════════════════════════════════════════
async function GET(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(r.status);
  return r.json();
}
async function POST(path, body) {
  const r = await fetch(API + path, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}
async function PATCH(path, body) {
  const r = await fetch(API + path, {
    method: 'PATCH', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}
async function DEL(path) {
  const r = await fetch(API + path, { method: 'DELETE' });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

// ═══ Stats ═══════════════════════════════════════════════════
async function loadStats() {
  try {
    const d = await GET('/stats');
    document.getElementById('s-images').textContent   = fmt(d.total_images);
    document.getElementById('s-persons').textContent  = fmt(d.total_persons);
    document.getElementById('s-faces').textContent    = fmt(d.total_faces);
    document.getElementById('s-clusters').textContent = fmt(d.total_clusters);
    document.getElementById('nb-persons').textContent = d.total_persons || 0;
  } catch(e) {}
}

async function loadFolders() {
  try {
    const d = await GET('/organised');
    const el = document.getElementById('folderList');
    if (!d.folders?.length) {
      el.innerHTML = `<div style="padding:4px 8px;font-size:11px;color:var(--muted)">no output yet</div>`;
      return;
    }
    el.innerHTML = d.folders.map(f => `
      <div class="folder-row">
        <span title="${esc(f.name)}">${esc(f.name)}</span>
        <span class="folder-cnt">${f.count}</span>
      </div>`).join('');
  } catch(e) {}
}

async function prefetchDupCount() {
  try {
    const d = await GET('/duplicates?limit=200');
    document.getElementById('nb-dups').textContent = d.count || 0;
    S._dupData = d;
  } catch(e) { document.getElementById('nb-dups').textContent = '?'; }
}

async function prefetchClassifyCount() {
  try {
    const d = await GET('/classify?limit=2000');
    const extra = (d.counts.screenshot || 0) + (d.counts.document || 0);
    document.getElementById('nb-classify').textContent = extra || 0;
    S._classifyData = d;
  } catch(e) { document.getElementById('nb-classify').textContent = '?'; }
}

// ═══ Navigation ═══════════════════════════════════════════════
function nav(view, el, extra = {}) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  S.view = view; S.page = 1; S.photos = [];
  Object.assign(S, extra);

  const titles = {
    photos: 'All Photos', persons: 'People', timeline: 'Timeline',
    person_photos: S.personName,
    duplicates: 'Near-Duplicate Review',
    classify: 'Docs & Screenshots',
  };
  document.getElementById('pageTitle').textContent = titles[view] || view;
  document.getElementById('toolbarExtras').innerHTML = '';

  if (view === 'photos' || view === 'person_photos') {
    document.getElementById('toolbarExtras').innerHTML = `
      <select class="sel-ctrl" onchange="S.sort=this.value;${view==='photos'?'renderPhotos()':'renderPersonPhotos()'}">
        <option value="processed_desc">Newest first</option>
        <option value="processed_asc">Oldest first</option>
        <option value="filename_asc">A → Z</option>
        <option value="filename_desc">Z → A</option>
      </select>
      <button class="tb-btn on" id="btn-normal" onclick="setDensity('normal',this)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
      </button>
      <button class="tb-btn" id="btn-dense" onclick="setDensity('dense',this)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="2" width="4" height="4"/><rect x="10" y="2" width="4" height="4"/>
          <rect x="18" y="2" width="4" height="4"/><rect x="2" y="10" width="4" height="4"/>
          <rect x="10" y="10" width="4" height="4"/><rect x="18" y="10" width="4" height="4"/>
          <rect x="2" y="18" width="4" height="4"/><rect x="10" y="18" width="4" height="4"/>
          <rect x="18" y="18" width="4" height="4"/>
        </svg>
      </button>`;
    if (view === 'person_photos') {
      document.getElementById('toolbarExtras').insertAdjacentHTML('afterbegin',
        `<button class="tb-btn" onclick="nav('persons',document.querySelector('[data-view=persons]'))">← Back</button>`);
    }
  }

  const renderers = {
    photos: renderPhotos, persons: renderPersons, timeline: renderTimeline,
    person_photos: renderPersonPhotos, duplicates: renderDuplicates,
    classify: renderClassify,
  };
  (renderers[view] || renderPhotos)();
}

function setDensity(d, btn) {
  S.density = d;
  document.querySelectorAll('.tb-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  const g = document.getElementById('photoGrid');
  if (g) g.className = `photo-grid${d === 'dense' ? ' dense' : ''}`;
}

// ═══ Photos ═══════════════════════════════════════════════════
async function renderPhotos() {
  const c = document.getElementById('content');
  c.innerHTML = '<div class="spinner"></div>';
  try {
    const d = await GET(`/images?page=1&per_page=80&sort=${S.sort}`);
    S.photos = d.images; S.total = d.total;
    paintGrid(c, d.images, d.total, 'renderPhotos');
  } catch(e) {
    c.innerHTML = mkEmpty('📷', 'No photos found', 'Run <code>python main.py</code> to process your photos.');
  }
}

async function renderPersonPhotos() {
  const c = document.getElementById('content');
  c.innerHTML = '<div class="spinner"></div>';
  try {
    const d = await GET(`/persons/${S.personId}/images?page=1&per_page=80`);
    S.photos = d.images; S.total = d.total;
    paintGrid(c, d.images, d.total, 'renderPersonPhotos');
  } catch(e) {
    c.innerHTML = mkEmpty('📷', 'No photos', 'No photos found for this person.');
  }
}

function paintGrid(container, images, total, moreFn) {
  if (!images.length) { container.innerHTML = mkEmpty('📷', 'No photos', 'Process some images first.'); return; }
  const cls = `photo-grid${S.density === 'dense' ? ' dense' : ''}`;
  container.innerHTML = `
    <div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:12px">
      ${total.toLocaleString()} image${total !== 1 ? 's' : ''}
    </div>
    <div class="${cls}" id="photoGrid">
      ${images.map((img, i) => photoCard(img, i)).join('')}
    </div>
    ${total > images.length ? `<div style="text-align:center;padding:24px">
      <button class="tb-btn" style="padding:0 22px;height:34px" onclick="${moreFn}More()">Load more</button>
    </div>` : ''}`;
  lazyLoad();
}

function photoCard(img, i) {
  const name = img.filename || (img.file_path?.split('/').pop()) || '—';
  const date = img.processed_at
    ? new Date(img.processed_at).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'})
    : '';
  return `
    <div class="photo-card" onclick="lbOpen(${i})">
      <img data-src="${API}/images/${img.id}/thumbnail" alt="${esc(name)}" onerror="this.style.opacity='.1'">
      ${img.exists === false ? '<div class="miss-badge">MISSING</div>' : ''}
      <div class="ov">${esc(name.substring(0,24))}${name.length>24?'…':''}<br>${date}</div>
    </div>`;
}

async function renderPhotosMore() {
  S.page++;
  const d = await GET(`/images?page=${S.page}&per_page=80&sort=${S.sort}`);
  const prev = S.photos.length;
  S.photos.push(...d.images);
  const g = document.getElementById('photoGrid');
  if (g) { g.insertAdjacentHTML('beforeend', d.images.map((img,i)=>photoCard(img,prev+i)).join('')); lazyLoad(); }
}
async function renderPersonPhotosMore() {
  S.page++;
  const d = await GET(`/persons/${S.personId}/images?page=${S.page}&per_page=80`);
  const prev = S.photos.length;
  S.photos.push(...d.images);
  const g = document.getElementById('photoGrid');
  if (g) { g.insertAdjacentHTML('beforeend', d.images.map((img,i)=>photoCard(img,prev+i)).join('')); lazyLoad(); }
}

// ═══ People ═══════════════════════════════════════════════════
async function renderPersons() {
  const c = document.getElementById('content');
  c.innerHTML = '<div class="spinner"></div>';
  try {
    const d = await GET('/persons');
    S.persons = d.persons;
    if (!d.persons?.length) {
      c.innerHTML = mkEmpty('👤', 'No people identified', 'Process photos with faces to detect people.');
      return;
    }
    c.innerHTML = `
      <div class="merge-bar" id="mergeBar">
        <h3>⇄ Merge two people</h3>
        <div class="merge-row">
          <select class="merge-sel" id="mergeSrc">
            ${d.persons.map(p=>`<option value="${p.id}">${esc(p.name)} (${p.photo_count} photos)</option>`).join('')}
          </select>
          <span style="color:var(--muted);font-size:12px">→ into →</span>
          <select class="merge-sel" id="mergeTgt">
            ${d.persons.map(p=>`<option value="${p.id}">${esc(p.name)} (${p.photo_count} photos)</option>`).join('')}
          </select>
          <button class="tb-btn on" onclick="doMerge()">Merge</button>
          <button class="tb-btn" onclick="document.getElementById('mergeBar').classList.remove('open')">Cancel</button>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
        <span style="font-family:var(--mono);font-size:11px;color:var(--muted)">
          ${d.persons.length} people · double-click name to rename
        </span>
        <button class="tb-btn" onclick="document.getElementById('mergeBar').classList.toggle('open')">⇄ Merge…</button>
      </div>
      <div class="person-grid">
        ${d.persons.map(p => personCard(p)).join('')}
      </div>`;
  } catch(e) {
    c.innerHTML = mkEmpty('👤', 'Error', 'Check the API server is running.');
  }
}

function personCard(p) {
  const initials = p.name.trim().slice(0,2).toUpperCase();
  const thumbSrc = p.sample_face_id ? `${API}/faces/${p.sample_face_id}/crop` : '';
  const avatar = thumbSrc
    ? `<img src="${thumbSrc}" alt="${esc(p.name)}" onerror="this.parentElement.innerHTML='<span>${initials}</span>'">`
    : `<span>${initials}</span>`;
  return `
    <div class="person-card" onclick="openPerson(${p.id},'${escAttr(p.name)}')">
      <div class="person-avatar">
        ${avatar}
        <div class="person-avatar-ring"></div>
      </div>
      <div class="person-name" id="pn-${p.id}"
           ondblclick="startRename(event,${p.id})"
           title="Double-click to rename">${esc(p.name)}</div>
      <div class="person-meta">${p.photo_count} photos · ${p.face_count} faces</div>
    </div>`;
}

function openPerson(id, name) {
  nav('person_photos', null, {personId: id, personName: name});
  document.getElementById('pageTitle').textContent = name;
}

async function doMerge() {
  const src = +document.getElementById('mergeSrc').value;
  const tgt = +document.getElementById('mergeTgt').value;
  if (src === tgt) { toast('Source and target must differ', 'err'); return; }
  const srcName = S.persons.find(p=>p.id===src)?.name;
  const tgtName = S.persons.find(p=>p.id===tgt)?.name;
  if (!confirm(`Merge "${srcName}" into "${tgtName}"?\n\nThis cannot be undone.`)) return;
  try {
    await POST('/persons/merge', {source_id: src, target_id: tgt});
    toast(`Merged ${srcName} → ${tgtName}`, 'ok');
    loadStats(); renderPersons();
  } catch(e) { toast('Merge failed', 'err'); }
}

async function startRename(event, personId) {
  event.stopPropagation();
  const el = document.getElementById(`pn-${personId}`);
  const old = el.textContent.trim();
  el.innerHTML = `<input class="person-name-inp" value="${escAttr(old)}" onclick="event.stopPropagation()">`;
  const inp = el.querySelector('input');
  inp.focus(); inp.select();
  const commit = () => doRename(personId, inp.value, el, old);
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') inp.blur();
    if (e.key === 'Escape') el.textContent = old;
  });
}

async function doRename(id, newName, el, fallback) {
  newName = newName.trim();
  if (!newName || newName === fallback) { el.textContent = fallback; return; }
  try {
    await PATCH(`/persons/${id}`, {name: newName});
    el.textContent = newName;
    toast(`Renamed → ${newName}`, 'ok');
    loadStats(); loadFolders();
  } catch(e) {
    el.textContent = fallback;
    toast('Rename failed', 'err');
  }
}

// ═══ Timeline ═════════════════════════════════════════════════
async function renderTimeline() {
  const c = document.getElementById('content');
  c.innerHTML = '<div class="spinner"></div>';
  try {
    const d = await GET('/timeline');
    if (!d.timeline?.length) {
      c.innerHTML = mkEmpty('📅', 'No timeline data', 'Photos need timestamps to generate a timeline.'); return;
    }
    c.innerHTML = d.timeline.map(m => {
      const [y,mo] = m.month.split('-');
      const label = new Date(+y,+mo-1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
      return `
        <div style="margin-bottom:28px">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
            <span style="font-family:var(--display);font-size:16px;color:var(--text)">${label}</span>
            <span style="font-family:var(--mono);font-size:11px;color:var(--muted)">${m.count} images</span>
            <div style="flex:1;height:1px;background:var(--border)"></div>
          </div>
        </div>`;
    }).join('');
  } catch(e) {
    c.innerHTML = mkEmpty('📅', 'Error', 'Could not load timeline.');
  }
}

// ═══ Near-Duplicates ══════════════════════════════════════════
async function renderDuplicates() {
  const c = document.getElementById('content');
  c.innerHTML = '<div class="spinner"></div>';

  document.getElementById('toolbarExtras').innerHTML = `
    <label style="font-family:var(--mono);font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px">
      Sensitivity
      <select class="sel-ctrl" id="dupThreshold" onchange="renderDuplicates()">
        <option value="4">Exact only (4)</option>
        <option value="8" selected>High (8)</option>
        <option value="14">Medium (14)</option>
        <option value="24">Low (24)</option>
      </select>
    </label>`;

  const threshold = document.getElementById('dupThreshold')?.value || 8;

  try {
    let d;
    if (S._dupData && threshold == 8) {
      d = S._dupData;
    } else {
      d = await GET(`/duplicates?threshold=${threshold}&limit=100`);
      S._dupData = d;
    }
    S.dupPairs = d.pairs;
    document.getElementById('nb-dups').textContent = d.count;

    if (!d.pairs?.length) {
      c.innerHTML = mkEmpty('✨', 'No near-duplicates found',
        'Great news — no duplicate images detected at this sensitivity level. Try a higher sensitivity to find more candidates.');
      return;
    }

    c.innerHTML = `
      <div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:16px">
        ${d.count} potential duplicate pair${d.count !== 1 ? 's' : ''} found —
        choose which to keep, or skip if unsure.
      </div>
      <div class="dup-grid" id="dupGrid">
        ${d.pairs.map((pair, i) => dupPairCard(pair, i)).join('')}
      </div>`;
    lazyLoad();
  } catch(e) {
    c.innerHTML = mkEmpty('🔍', 'Error', 'Could not load duplicates. Ensure the API server is running.');
  }
}

function dupPairCard(pair, idx) {
  const simColor = pair.distance === 0 ? 'var(--rose)' : pair.similarity_pct > 95 ? 'var(--gold)' : 'var(--text2)';
  return `
    <div class="dup-pair" id="dup-${idx}">
      <div class="dup-img-side" id="side-a-${idx}" onclick="lbOpenPath('${escAttr(pair.image_a.file_path)}')">
        <img data-src="${API}/images/${pair.image_a.id}/thumbnail" alt="">
        <div class="dup-img-label">
          ${esc(pair.image_a.filename.substring(0,28))}${pair.image_a.filename.length>28?'…':''}
          <br><span style="color:var(--muted)">ID: ${pair.image_a.id}</span>
        </div>
      </div>
      <div class="dup-img-side" id="side-b-${idx}" onclick="lbOpenPath('${escAttr(pair.image_b.file_path)}')">
        <img data-src="${API}/images/${pair.image_b.id}/thumbnail" alt="">
        <div class="dup-img-label">
          ${esc(pair.image_b.filename.substring(0,28))}${pair.image_b.filename.length>28?'…':''}
          <br><span style="color:var(--muted)">ID: ${pair.image_b.id}</span>
        </div>
      </div>
      <div class="dup-actions">
        <div class="dup-sim">
          <strong style="color:${simColor}">${pair.similarity_pct}%</strong>
          similar
          ${pair.distance === 0 ? '<br><span style="color:var(--rose);font-size:10px">pixel-identical</span>' : ''}
        </div>
        <label class="dup-del-chk">
          <input type="checkbox" id="del-file-${idx}" checked>
          Delete file from disk
        </label>
        <button class="action-btn keep-a" onclick="dupKeep(${idx},${pair.image_a.id},${pair.image_b.id})">
          ✓ Keep Left
        </button>
        <button class="action-btn keep-b" onclick="dupKeep(${idx},${pair.image_b.id},${pair.image_a.id})">
          ✓ Keep Right
        </button>
        <button class="action-btn skip" onclick="dupSkip(${idx})">
          Skip →
        </button>
      </div>
    </div>`;
}

async function dupKeep(idx, keepId, deleteId) {
  const delFile = document.getElementById(`del-file-${idx}`)?.checked ?? false;
  try {
    await POST('/duplicates/keep', {keep_id: keepId, delete_id: deleteId, delete_file: delFile});
    const card = document.getElementById(`dup-${idx}`);
    if (card) {
      card.style.transition = 'opacity .3s, max-height .4s';
      card.style.opacity = '0'; card.style.maxHeight = '0'; card.style.overflow = 'hidden';
      setTimeout(() => card.remove(), 450);
    }
    toast(`Kept image ${keepId}${delFile ? ', deleted file' : ''}`, 'ok');
    loadStats();
    // Update badge
    const badge = document.getElementById('nb-dups');
    const cur = parseInt(badge.textContent) || 0;
    badge.textContent = Math.max(0, cur - 1);
  } catch(e) { toast('Error: ' + e.message, 'err'); }
}

function dupSkip(idx) {
  const card = document.getElementById(`dup-${idx}`);
  if (card) {
    card.style.opacity = '0.3';
    card.style.pointerEvents = 'none';
    toast('Pair skipped', '');
  }
}

// ═══ Classify (Docs & Screenshots) ════════════════════════════
async function renderClassify() {
  const c = document.getElementById('content');
  c.innerHTML = '<div class="spinner"></div>';

  document.getElementById('toolbarExtras').innerHTML = `
    <button class="tb-btn" onclick="doMoveClassified()">
      📂 Move to review folders
    </button>`;

  try {
    const d = S._classifyData || await GET('/classify?limit=2000');
    S._classifyData = d;
    const ssCount  = d.counts.screenshot || 0;
    const docCount = d.counts.document   || 0;
    const phCount  = d.counts.photo      || 0;
    document.getElementById('nb-classify').textContent = ssCount + docCount;

    c.innerHTML = `
      <div class="classify-summary">
        <div class="classify-card">
          <div class="classify-icon">🖼️</div>
          <div class="classify-count">${fmt(phCount)}</div>
          <div class="classify-label">Photos</div>
        </div>
        <div class="classify-card" style="border-color:rgba(90,143,196,.3)">
          <div class="classify-icon">📱</div>
          <div class="classify-count" style="color:var(--sky)">${fmt(ssCount)}</div>
          <div class="classify-label">Screenshots</div>
          <div style="margin-top:8px;font-family:var(--mono);font-size:10px;color:var(--muted)">
            → _Review_Screenshots/
          </div>
        </div>
        <div class="classify-card" style="border-color:rgba(139,111,196,.3)">
          <div class="classify-icon">📄</div>
          <div class="classify-count" style="color:var(--violet)">${fmt(docCount)}</div>
          <div class="classify-label">Documents & Scans</div>
          <div style="margin-top:8px;font-family:var(--mono);font-size:10px;color:var(--muted)">
            → _Review_Documents/
          </div>
        </div>
      </div>

      ${ssCount > 0 ? `
        <h3 style="font-family:var(--display);font-size:15px;color:var(--text);margin-bottom:10px">
          Screenshots (${ssCount})
        </h3>
        <div class="classify-grid" style="margin-bottom:20px">
          ${d.screenshots.map(img => classifyThumb(img)).join('')}
          ${ssCount > d.screenshots.length ? `<div style="display:flex;align-items:center;justify-content:center;aspect-ratio:1;background:var(--surface3);border-radius:var(--r-sm);font-size:11px;color:var(--muted)">+${ssCount - d.screenshots.length} more</div>` : ''}
        </div>` : ''}

      ${docCount > 0 ? `
        <h3 style="font-family:var(--display);font-size:15px;color:var(--text);margin-bottom:10px">
          Documents & Scans (${docCount})
        </h3>
        <div class="classify-grid">
          ${d.documents.map(img => classifyThumb(img)).join('')}
          ${docCount > d.documents.length ? `<div style="display:flex;align-items:center;justify-content:center;aspect-ratio:1;background:var(--surface3);border-radius:var(--r-sm);font-size:11px;color:var(--muted)">+${docCount - d.documents.length} more</div>` : ''}
        </div>` : ''}

      ${ssCount === 0 && docCount === 0 ? mkEmpty('✨', 'All clean!',
        'No screenshots or documents found in your photo library.') : ''}`;
    lazyLoad();
  } catch(e) {
    c.innerHTML = mkEmpty('📂', 'Error', 'Could not classify images.');
  }
}

function classifyThumb(img) {
  const name = img.filename.substring(0, 20) + (img.filename.length > 20 ? '…' : '');
  return `
    <div class="classify-thumb" onclick="lbOpenPath('${escAttr(img.file_path)}')">
      <img data-src="${API}/images/${img.id}/thumbnail" alt="${esc(img.filename)}">
      <div class="classify-thumb-name">${esc(name)}</div>
    </div>`;
}

async function doMoveClassified() {
  if (!confirm('Copy screenshots and documents to review folders inside your output directory?\n\nOriginal files will NOT be deleted — copies are made for your review.')) return;
  try {
    const d = await POST('/classify/move', {move_screenshots: true, move_documents: true});
    toast(`Moved ${d.moved.screenshot} screenshots, ${d.moved.document} documents`, 'ok');
  } catch(e) { toast('Error moving files', 'err'); }
}

// ═══ Lightbox ═════════════════════════════════════════════════
function lbOpen(idx) {
  if (!S.photos.length) return;
  S.lbIdx = idx;
  paintLb(S.photos[idx]);
  document.getElementById('lb').classList.add('open');
}

function lbOpenPath(path) {
  document.getElementById('lbImg').src = `${API}/images/${encodeURIComponent(path)}/../full` || path;
  // Simpler: use /full via the API — need an id. Fallback: serve directly if possible
  // For simplicity, show a full-screen preview via the path itself (may not work cross-origin)
  // Use the thumbnail as a preview instead
  document.getElementById('lbFname').textContent = path.split('/').pop();
  document.getElementById('lbDate').textContent = '';
  document.getElementById('lb').classList.add('open');
}

function paintLb(img) {
  if (!img) return;
  document.getElementById('lbImg').src = `${API}/images/${img.id}/full`;
  document.getElementById('lbFname').textContent = img.filename || img.file_path?.split('/').pop() || '';
  document.getElementById('lbDate').textContent = img.processed_at
    ? new Date(img.processed_at).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})
    : '';
}

function lbClose() { document.getElementById('lb').classList.remove('open'); }
function lbBgClick(e) { if (e.target === e.currentTarget) lbClose(); }
function lbNav(dir) {
  const n = S.lbIdx + dir;
  if (n >= 0 && n < S.photos.length) { S.lbIdx = n; paintLb(S.photos[n]); }
}

// ═══ Search ═══════════════════════════════════════════════════
function initSearch() {
  const inp  = document.getElementById('searchInput');
  const drop = document.getElementById('searchDrop');
  let timer;
  inp.addEventListener('input', () => {
    clearTimeout(timer);
    const q = inp.value.trim();
    if (!q) { drop.classList.remove('open'); return; }
    timer = setTimeout(() => doSearch(q), 280);
  });
  inp.addEventListener('blur', () => setTimeout(() => drop.classList.remove('open'), 200));
  inp.addEventListener('focus', () => { if (inp.value.trim()) drop.classList.add('open'); });
}

async function doSearch(q) {
  const drop = document.getElementById('searchDrop');
  try {
    const d = await GET(`/search?q=${encodeURIComponent(q)}`);
    let html = '';
    if (d.persons?.length) {
      html += `<div class="sdrop-section">
        <div class="sdrop-label">People</div>
        ${d.persons.map(p => `
          <div class="sdrop-item" onclick="openPerson(${p.id},'${escAttr(p.name)}');document.getElementById('searchInput').value=''">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            ${esc(p.name)}
          </div>`).join('')}
      </div>`;
    }
    if (d.images?.length) {
      html += `<div class="sdrop-section">
        <div class="sdrop-label">Images</div>
        ${d.images.map(img => `
          <div class="sdrop-item">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
            </svg>
            ${esc(img.filename)}
          </div>`).join('')}
      </div>`;
    }
    if (!html) html = `<div class="sdrop-section"><div class="sdrop-item" style="color:var(--muted)">No results for "${esc(q)}"</div></div>`;
    drop.innerHTML = html;
    drop.classList.add('open');
  } catch(e) {}
}

// ═══ Lazy load ════════════════════════════════════════════════
function lazyLoad() {
  const imgs = document.querySelectorAll('img[data-src]');
  if (!('IntersectionObserver' in window)) {
    imgs.forEach(i => { i.src = i.dataset.src; delete i.dataset.src; });
    return;
  }
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const i = e.target;
        i.src = i.dataset.src;
        delete i.dataset.src;
        i.addEventListener('load', () => i.classList.add('loaded'), {once:true});
        io.unobserve(i);
      }
    });
  }, {rootMargin: '140px'});
  imgs.forEach(i => io.observe(i));
}

// ═══ Helpers ══════════════════════════════════════════════════
function fmt(n) { return n != null ? Number(n).toLocaleString() : '—'; }
function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s??'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function mkEmpty(icon, title, msg) {
  return `<div class="empty"><div class="empty-icon">${icon}</div><h3>${title}</h3><p>${msg}</p></div>`;
}
let _toastTimer;
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}
</script>
